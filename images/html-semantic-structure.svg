<svg xmlns="http://www.w3.org/2000/svg" width="700" height="350" viewBox="0 0 700 350" role="img" aria-labelledby="title desc">
  <title id="title">Semantic HTML structure</title>
  <desc id="desc">Semantic HTML uses header, nav, main, article, aside, and footer regions.</desc>
  <rect width="700" height="350" fill="#f4f7fb"/>
  <rect x="28" y="28" width="644" height="294" rx="8" fill="#fff" stroke="#d7e0ec"/>
  <text x="350" y="63" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="27" font-weight="700" fill="#12355b">Semantic HTML and Accessibility</text>
  <rect x="145" y="93" width="410" height="212" rx="8" fill="#edf2f7" stroke="#d7e0ec"/>
  <rect x="175" y="118" width="350" height="32" rx="6" fill="#12355b"/>
  <rect x="175" y="162" width="350" height="28" rx="6" fill="#c2415d"/>
  <rect x="175" y="202" width="220" height="62" rx="6" fill="#e0f2fe" stroke="#7dd3fc"/>
  <rect x="410" y="202" width="115" height="62" rx="6" fill="#fef3c7" stroke="#f59e0b"/>
  <rect x="175" y="276" width="350" height="20" rx="6" fill="#12355b"/>
  <g font-family="Segoe UI,Arial,sans-serif" font-size="14" font-weight="700" text-anchor="middle">
    <text x="350" y="139" fill="#fff">header</text><text x="350" y="182" fill="#fff">nav</text><text x="285" y="237" fill="#12355b">main / article</text><text x="468" y="237" fill="#12355b">aside</text><text x="350" y="292" fill="#fff">footer</text>
  </g>
</svg>
