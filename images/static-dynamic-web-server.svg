<svg xmlns="http://www.w3.org/2000/svg" width="700" height="350" viewBox="0 0 700 350" role="img" aria-labelledby="title desc">
  <title id="title">Static versus dynamic web server</title>
  <desc id="desc">A comparison between static file serving and dynamic application generated content.</desc>
  <rect width="700" height="350" fill="#f4f7fb"/>
  <rect x="28" y="28" width="644" height="294" rx="8" fill="#ffffff" stroke="#d7e0ec"/>
  <text x="350" y="62" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="27" font-weight="700" fill="#12355b">Static vs Dynamic Web Servers</text>
  <line x1="350" y1="90" x2="350" y2="295" stroke="#d7e0ec" stroke-width="2"/>
  <g transform="translate(70 105)">
    <text x="120" y="0" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#12355b">Static</text>
    <rect x="18" y="32" width="204" height="120" rx="8" fill="#e0f2fe" stroke="#7dd3fc"/>
    <rect x="46" y="58" width="42" height="52" rx="5" fill="#ffffff" stroke="#9fb0c5"/>
    <rect x="101" y="58" width="42" height="52" rx="5" fill="#ffffff" stroke="#9fb0c5"/>
    <rect x="156" y="58" width="42" height="52" rx="5" fill="#ffffff" stroke="#9fb0c5"/>
    <text x="67" y="91" text-anchor="middle" font-family="Consolas, monospace" font-size="13" fill="#c2415d">HTML</text>
    <text x="122" y="91" text-anchor="middle" font-family="Consolas, monospace" font-size="13" fill="#c2415d">CSS</text>
    <text x="177" y="91" text-anchor="middle" font-family="Consolas, monospace" font-size="13" fill="#c2415d">JS</text>
    <text x="120" y="184" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#526174">Same files for every visitor</text>
  </g>
  <g transform="translate(410 105)">
    <text x="120" y="0" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700" fill="#12355b">Dynamic</text>
    <rect x="18" y="32" width="204" height="120" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
    <rect x="45" y="54" width="70" height="60" rx="8" fill="#12355b"/>
    <text x="80" y="89" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" fill="#ffffff">App</text>
    <ellipse cx="160" cy="60" rx="34" ry="13" fill="#c2415d"/>
    <rect x="126" y="60" width="68" height="48" fill="#c2415d"/>
    <ellipse cx="160" cy="108" rx="34" ry="13" fill="#9f2d48"/>
    <text x="160" y="90" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#ffffff">DB</text>
    <path d="M118 84 H124" stroke="#526174" stroke-width="4" stroke-linecap="round"/>
    <text x="120" y="184" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#526174">Content generated per request</text>
  </g>
</svg>
