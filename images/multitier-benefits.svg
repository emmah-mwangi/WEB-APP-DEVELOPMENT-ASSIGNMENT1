<svg xmlns="http://www.w3.org/2000/svg" width="700" height="350" viewBox="0 0 700 350" role="img" aria-labelledby="title desc">
  <title id="title">Benefits of multitier architecture</title>
  <desc id="desc">Four benefit panels show scalability, maintainability, security, and reuse.</desc>
  <rect width="700" height="350" fill="#f4f7fb"/>
  <rect x="28" y="28" width="644" height="294" rx="8" fill="#ffffff" stroke="#d7e0ec"/>
  <text x="350" y="62" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="27" font-weight="700" fill="#12355b">Benefits of Multitier Architecture</text>
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="72" y="98" width="250" height="83" rx="8" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="2"/>
    <path d="M107 151 V124 M130 151 V113 M153 151 V135" stroke="#12355b" stroke-width="8" stroke-linecap="round"/>
    <text x="184" y="128" font-size="18" font-weight="700" fill="#12355b">Scalability</text>
    <text x="184" y="151" font-size="14" fill="#2f3b4d">Grow only the tier</text>
    <text x="184" y="170" font-size="14" fill="#2f3b4d">that needs capacity.</text>

    <rect x="378" y="98" width="250" height="83" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="424" cy="139" r="22" fill="#12355b"/>
    <path d="M414 139 H434 M424 129 V149" stroke="#ffffff" stroke-width="5" stroke-linecap="round"/>
    <text x="470" y="128" font-size="18" font-weight="700" fill="#12355b">Maintainability</text>
    <text x="470" y="151" font-size="14" fill="#2f3b4d">Change UI, logic, or</text>
    <text x="470" y="170" font-size="14" fill="#2f3b4d">data separately.</text>

    <rect x="72" y="218" width="250" height="83" rx="8" fill="#fee2e2" stroke="#c2415d" stroke-width="2"/>
    <path d="M131 248 L160 264 V285 C143 293 119 293 102 285 V264 Z" fill="#12355b"/>
    <path d="M118 262 V249 C118 231 144 231 144 249 V262" fill="none" stroke="#12355b" stroke-width="8" stroke-linecap="round"/>
    <text x="184" y="248" font-size="18" font-weight="700" fill="#12355b">Layered Security</text>
    <text x="184" y="271" font-size="14" fill="#2f3b4d">Protect each network</text>
    <text x="184" y="290" font-size="14" fill="#2f3b4d">boundary on its own.</text>

    <rect x="378" y="218" width="250" height="83" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <path d="M411 260 H448 M429 242 V279" stroke="#12355b" stroke-width="8" stroke-linecap="round"/>
    <circle cx="429" cy="260" r="26" fill="none" stroke="#12355b" stroke-width="5"/>
    <text x="470" y="248" font-size="18" font-weight="700" fill="#12355b">Reusable APIs</text>
    <text x="470" y="271" font-size="14" fill="#2f3b4d">Serve web, mobile,</text>
    <text x="470" y="290" font-size="14" fill="#2f3b4d">partners, and devices.</text>
  </g>
</svg>
