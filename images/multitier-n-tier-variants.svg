<svg xmlns="http://www.w3.org/2000/svg" width="700" height="350" viewBox="0 0 700 350" role="img" aria-labelledby="title desc">
  <title id="title">N-tier architecture variants</title>
  <desc id="desc">An expanded n-tier architecture includes edge delivery, gateways, services, cache, databases, and external integrations.</desc>
  <rect width="700" height="350" fill="#f4f7fb"/>
  <rect x="28" y="28" width="644" height="294" rx="8" fill="#ffffff" stroke="#d7e0ec"/>
  <text x="350" y="62" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="27" font-weight="700" fill="#12355b">N-Tier and Multi-Layer Variants</text>
  <g font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#12355b">
    <rect x="53" y="122" width="112" height="66" rx="8" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="2"/>
    <text x="109" y="149" text-anchor="middle" font-size="16">Edge CDN</text>
    <text x="109" y="170" text-anchor="middle" font-size="13" font-weight="600" fill="#526174">static assets</text>

    <rect x="208" y="122" width="112" height="66" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="264" y="149" text-anchor="middle" font-size="16">API Gateway</text>
    <text x="264" y="170" text-anchor="middle" font-size="13" font-weight="600" fill="#526174">routing</text>

    <rect x="363" y="122" width="112" height="66" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="419" y="149" text-anchor="middle" font-size="16">Services</text>
    <text x="419" y="170" text-anchor="middle" font-size="13" font-weight="600" fill="#526174">domain logic</text>

    <rect x="518" y="122" width="112" height="66" rx="8" fill="#fee2e2" stroke="#c2415d" stroke-width="2"/>
    <text x="574" y="149" text-anchor="middle" font-size="16">Data Store</text>
    <text x="574" y="170" text-anchor="middle" font-size="13" font-weight="600" fill="#526174">records</text>

    <rect x="208" y="236" width="112" height="58" rx="8" fill="#edf2f7" stroke="#9fb0c5" stroke-width="2"/>
    <text x="264" y="261" text-anchor="middle" font-size="16">Cache</text>
    <text x="264" y="281" text-anchor="middle" font-size="13" font-weight="600" fill="#526174">Redis</text>

    <rect x="363" y="236" width="112" height="58" rx="8" fill="#edf2f7" stroke="#9fb0c5" stroke-width="2"/>
    <text x="419" y="261" text-anchor="middle" font-size="16">Integration</text>
    <text x="419" y="281" text-anchor="middle" font-size="13" font-weight="600" fill="#526174">queues APIs</text>
  </g>
  <path d="M167 155 H204 M322 155 H359 M477 155 H514" stroke="#c2415d" stroke-width="5" stroke-linecap="round"/>
  <path d="M190 143 L210 155 L190 167 M345 143 L365 155 L345 167 M500 143 L520 155 L500 167" fill="none" stroke="#c2415d" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M264 189 V231 M419 189 V231" stroke="#12355b" stroke-width="4" stroke-linecap="round"/>
  <path d="M252 218 L264 236 L276 218 M407 218 L419 236 L431 218" fill="none" stroke="#12355b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
