<svg xmlns="http://www.w3.org/2000/svg" width="700" height="350" viewBox="0 0 700 350" role="img" aria-labelledby="title desc">
  <title id="title">Intranet architecture</title>
  <desc id="desc">Browser clients access web servers, application servers, databases, directory services, and search.</desc>
