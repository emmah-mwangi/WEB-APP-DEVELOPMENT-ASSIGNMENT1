    <rect x="536" y="218" width="108" height="48" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="590" y="247" fill="#12355b">Directory</text>
  </g>
  <path d="M170 175 H213 M323 175 H352 M352 175 V127 H368 M352 175 V224 H368 M480 127 H535 M480 224 H535" stroke="#c2415d" stroke-width="4" stroke-linecap="round" fill="none"/>
