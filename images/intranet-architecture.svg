  <rect x="28" y="28" width="644" height="294" rx="8" fill="#ffffff" stroke="#d7e0ec"/>
  <text x="350" y="62" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="27" font-weight="700" fill="#12355b">Intranet Architecture</text>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" text-anchor="middle">
    <rect x="62" y="143" width="108" height="64" rx="8" fill="#e0f2fe" stroke="#7dd3fc"/>
    <text x="116" y="169" fill="#12355b">Employee</text>
    <text x="116" y="190" fill="#526174">Browser</text>
    <rect x="215" y="143" width="108" height="64" rx="8" fill="#edf2f7" stroke="#9fb0c5"/>
