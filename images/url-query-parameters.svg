<svg xmlns="http://www.w3.org/2000/svg" width="700" height="350" viewBox="0 0 700 350" role="img" aria-labelledby="title desc">
  <title id="title">URL query parameters</title>
  <desc id="desc">Query strings pass key-value parameters for search, filtering, sorting, and pagination.</desc>
  <rect width="700" height="350" fill="#f4f7fb"/>
  <rect x="28" y="28" width="644" height="294" rx="8" fill="#fff" stroke="#d7e0ec"/>
  <text x="350" y="63" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="27" font-weight="700" fill="#12355b">Query Strings and Parameters</text>
  <rect x="88" y="112" width="524" height="58" rx="8" fill="#15263b"/>
  <text x="350" y="148" text-anchor="middle" font-family="Consolas,monospace" font-size="20" fill="#fff">?search=internet&amp;lang=en&amp;page=2</text>
  <g font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="700" text-anchor="middle" fill="#12355b">
    <rect x="112" y="220" width="130" height="44" rx="8" fill="#e0f2fe" stroke="#7dd3fc"/><text x="177" y="248">search</text>
    <rect x="285" y="220" width="130" height="44" rx="8" fill="#fef3c7" stroke="#f59e0b"/><text x="350" y="248">language</text>
    <rect x="458" y="220" width="130" height="44" rx="8" fill="#e0f2fe" stroke="#7dd3fc"/><text x="523" y="248">page</text>
  </g>
</svg>
