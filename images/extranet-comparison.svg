<svg xmlns="http://www.w3.org/2000/svg" width="700" height="350" viewBox="0 0 700 350" role="img" aria-labelledby="title desc">
  <title id="title">Internet intranet extranet comparison</title>
  <desc id="desc">Internet is public, intranet is private, and extranet is private access for approved external users.</desc>
  <rect width="700" height="350" fill="#f4f7fb"/>
  <rect x="28" y="28" width="644" height="294" rx="8" fill="#ffffff" stroke="#d7e0ec"/>
  <text x="350" y="62" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="27" font-weight="700" fill="#12355b">Internet, Intranet, Extranet</text>
  <g font-family="Segoe UI, Arial, sans-serif" text-anchor="middle">
    <circle cx="180" cy="176" r="96" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/>
    <text x="180" y="137" font-size="21" font-weight="700" fill="#12355b">Internet</text>
    <text x="180" y="164" font-size="14" fill="#526174">public</text>
    <circle cx="350" cy="176" r="80" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="3"/>
    <text x="350" y="170" font-size="21" font-weight="700" fill="#12355b">Extranet</text>
    <text x="350" y="196" font-size="14" fill="#526174">selected partners</text>
    <circle cx="520" cy="176" r="66" fill="#12355b"/>
    <text x="520" y="171" font-size="21" font-weight="700" fill="#ffffff">Intranet</text>
    <text x="520" y="196" font-size="14" fill="#dbeafe">employees</text>
  </g>
  <text x="350" y="293" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#526174">Extranet sits between public access and fully private internal access.</text>
</svg>
