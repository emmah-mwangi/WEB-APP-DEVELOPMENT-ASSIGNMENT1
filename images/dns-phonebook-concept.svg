<svg xmlns="http://www.w3.org/2000/svg" width="700" height="350" viewBox="0 0 700 350" role="img" aria-labelledby="title desc">
  <title id="title">DNS phonebook concept</title>
  <desc id="desc">DNS translates readable domain names into IP addresses used by computers.</desc>
  <rect width="700" height="350" fill="#f4f7fb"/>
  <rect x="28" y="28" width="644" height="294" rx="8" fill="#ffffff" stroke="#d7e0ec"/>
  <text x="350" y="62" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="27" font-weight="700" fill="#12355b">DNS: The Internet Phonebook</text>
  <g transform="translate(65 105)">
    <rect x="0" y="0" width="170" height="165" rx="8" fill="#e0f2fe" stroke="#7dd3fc"/>
    <rect x="26" y="32" width="118" height="16" rx="8" fill="#12355b"/>
    <rect x="26" y="68" width="94" height="12" rx="6" fill="#526174"/>
    <rect x="26" y="98" width="118" height="12" rx="6" fill="#526174"/>
    <rect x="26" y="128" width="82" height="12" rx="6" fill="#526174"/>
    <text x="85" y="198" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#12355b">Domain Name</text>
    <text x="85" y="225" text-anchor="middle" font-family="Consolas, monospace" font-size="15" fill="#c2415d">www.example.com</text>
  </g>
  <g transform="translate(282 108)">
    <circle cx="68" cy="68" r="58" fill="#12355b"/>
    <text x="68" y="63" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" fill="#ffffff">DNS</text>
    <text x="68" y="88" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#dbeafe">Resolver</text>
  </g>
  <g transform="translate(482 105)">
    <rect x="0" y="0" width="154" height="165" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="77" y="55" text-anchor="middle" font-family="Consolas, monospace" font-size="20" font-weight="700" fill="#12355b">93.184</text>
    <text x="77" y="84" text-anchor="middle" font-family="Consolas, monospace" font-size="20" font-weight="700" fill="#12355b">216.34</text>
    <rect x="32" y="112" width="90" height="18" rx="9" fill="#c2415d"/>
    <text x="77" y="198" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#12355b">IP Address</text>
  </g>
  <path d="M239 178 H282 M418 178 H477" stroke="#c2415d" stroke-width="5" stroke-linecap="round"/>
  <path d="M264 166 L284 178 L264 190 M459 166 L479 178 L459 190" fill="none" stroke="#c2415d" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
