<svg xmlns="http://www.w3.org/2000/svg" width="700" height="350" viewBox="0 0 700 350" role="img" aria-labelledby="title desc">
  <title id="title">DNS record types table</title>
  <desc id="desc">A table showing common DNS records including A, AAAA, CNAME, MX, TXT, NS, SOA, and CAA.</desc>
  <rect width="700" height="350" fill="#f4f7fb"/>
  <rect x="28" y="28" width="644" height="294" rx="8" fill="#ffffff" stroke="#d7e0ec"/>
  <text x="350" y="62" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="27" font-weight="700" fill="#12355b">Common DNS Record Types</text>
  <g transform="translate(70 92)" font-family="Segoe UI, Arial, sans-serif">
    <rect width="560" height="206" rx="8" fill="#edf2f7" stroke="#d7e0ec"/>
    <rect width="560" height="38" rx="8" fill="#12355b"/>
    <text x="38" y="25" font-size="15" font-weight="700" fill="#ffffff">Record</text>
    <text x="170" y="25" font-size="15" font-weight="700" fill="#ffffff">Purpose</text>
    <g font-size="15" fill="#12355b">
      <text x="38" y="68" font-weight="700">A</text>
      <text x="170" y="68">Maps a name to an IPv4 address</text>
      <text x="38" y="94" font-weight="700">AAAA</text>
      <text x="170" y="94">Maps a name to an IPv6 address</text>
      <text x="38" y="120" font-weight="700">CNAME</text>
      <text x="170" y="120">Creates an alias to another hostname</text>
      <text x="38" y="146" font-weight="700">MX</text>
      <text x="170" y="146">Routes email to mail servers</text>
      <text x="38" y="172" font-weight="700">TXT</text>
      <text x="170" y="172">Stores verification, SPF, and DKIM text</text>
      <text x="38" y="198" font-weight="700">NS / SOA / CAA</text>
      <text x="170" y="198">Delegation, zone authority, certificate rules</text>
    </g>
    <line x1="130" y1="38" x2="130" y2="206" stroke="#d7e0ec" stroke-width="2"/>
    <g stroke="#d7e0ec" stroke-width="1">
      <line x1="0" y1="78" x2="560" y2="78"/>
      <line x1="0" y1="104" x2="560" y2="104"/>
      <line x1="0" y1="130" x2="560" y2="130"/>
      <line x1="0" y1="156" x2="560" y2="156"/>
      <line x1="0" y1="182" x2="560" y2="182"/>
    </g>
  </g>
</svg>
