  <path d="M331 130 V115 C331 91 369 91 369 115 V130" fill="none" stroke="#f59e0b" stroke-width="8" stroke-linecap="round"/>
  <text x="350" y="235" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="16" font-weight="700" fill="#12355b">TLS handshake + certificate + encrypted HTTP</text>
