<svg xmlns="http://www.w3.org/2000/svg" width="700" height="350" viewBox="0 0 700 350" role="img" aria-labelledby="title desc">
  <title id="title">HTTPS TLS encryption</title>
  <desc id="desc">HTTPS uses TLS certificates and encrypted sessions to protect HTTP traffic.</desc>
  <rect width="700" height="350" fill="#f4f7fb"/>
  <rect x="28" y="28" width="644" height="294" rx="8" fill="#fff" stroke="#d7e0ec"/>
  <text x="350" y="63" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="27" font-weight="700" fill="#12355b">HTTPS and TLS Encryption</text>
  <rect x="82" y="136" width="132" height="80" rx="8" fill="#e0f2fe" stroke="#7dd3fc"/>
  <rect x="486" y="136" width="132" height="80" rx="8" fill="#12355b"/>
  <text x="148" y="181" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="17" font-weight="700" fill="#12355b">Browser</text>
  <text x="552" y="181" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="17" font-weight="700" fill="#fff">Server</text>
  <path d="M225 176 H475" stroke="#c2415d" stroke-width="7" stroke-linecap="round"/>
