<svg xmlns="http://www.w3.org/2000/svg" width="700" height="350" viewBox="0 0 700 350" role="img" aria-labelledby="title desc">
  <title id="title">Detailed three-tier model</title>
  <desc id="desc">The presentation, application, and data tiers are shown with their main responsibilities.</desc>
  <rect width="700" height="350" fill="#f4f7fb"/>
  <rect x="28" y="28" width="644" height="294" rx="8" fill="#ffffff" stroke="#d7e0ec"/>
  <text x="350" y="62" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="27" font-weight="700" fill="#12355b">The Three-Tier Model</text>
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="72" y="96" width="556" height="58" rx="8" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="2"/>
    <circle cx="111" cy="125" r="19" fill="#12355b"/>
    <text x="111" y="131" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">1</text>
    <text x="156" y="119" font-size="18" font-weight="700" fill="#12355b">Presentation Tier</text>
    <text x="156" y="140" font-size="14" fill="#2f3b4d">User interface, forms, navigation, and client-side validation</text>

    <rect x="72" y="172" width="556" height="58" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <circle cx="111" cy="201" r="19" fill="#12355b"/>
    <text x="111" y="207" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">2</text>
    <text x="156" y="195" font-size="18" font-weight="700" fill="#12355b">Application Tier</text>
    <text x="156" y="216" font-size="14" fill="#2f3b4d">Business logic, workflows, authentication, and API endpoints</text>

    <rect x="72" y="248" width="556" height="58" rx="8" fill="#fee2e2" stroke="#c2415d" stroke-width="2"/>
    <circle cx="111" cy="277" r="19" fill="#12355b"/>
    <text x="111" y="283" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">3</text>
    <text x="156" y="271" font-size="18" font-weight="700" fill="#12355b">Data Tier</text>
    <text x="156" y="292" font-size="14" fill="#2f3b4d">Database management, indexing, transactions, and storage</text>
  </g>
  <path d="M350 154 V169 M350 230 V245" stroke="#c2415d" stroke-width="4" stroke-linecap="round"/>
  <path d="M340 160 L350 170 L360 160 M340 236 L350 246 L360 236" fill="none" stroke="#c2415d" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
