<svg xmlns="http://www.w3.org/2000/svg" width="700" height="350" viewBox="0 0 700 350" role="img" aria-labelledby="title desc">
  <title id="title">Web server security lock</title>
  <desc id="desc">A locked shield protecting a web server with TLS, firewall, patches, and logs.</desc>
