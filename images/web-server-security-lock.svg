  <text x="350" y="62" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="27" font-weight="700" fill="#12355b">Web Server Security</text>
  <g transform="translate(264 89)">
    <path d="M86 0 L166 34 V98 C166 150 130 184 86 206 C42 184 6 150 6 98 V34 Z" fill="#12355b"/>
    <path d="M86 22 L142 46 V96 C142 132 118 158 86 176 C54 158 30 132 30 96 V46 Z" fill="#e0f2fe"/>
