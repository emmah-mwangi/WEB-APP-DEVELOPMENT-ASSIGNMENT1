    <text x="564" y="155" text-anchor="middle" fill="#12355b">Patching</text>
    <rect x="505" y="214" width="118" height="48" rx="8" fill="#edf2f7" stroke="#d7e0ec"/>
    <text x="564" y="244" text-anchor="middle" fill="#12355b">Logging</text>
