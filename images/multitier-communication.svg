<svg xmlns="http://www.w3.org/2000/svg" width="700" height="350" viewBox="0 0 700 350" role="img" aria-labelledby="title desc">
  <title id="title">Communication between tiers</title>
  <desc id="desc">Presentation sends HTTPS requests to an API gateway, which talks to services, queues, and databases.</desc>
  <rect width="700" height="350" fill="#f4f7fb"/>
  <rect x="28" y="28" width="644" height="294" rx="8" fill="#ffffff" stroke="#d7e0ec"/>
  <text x="350" y="62" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="27" font-weight="700" fill="#12355b">Communication Between Tiers</text>
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="55" y="130" width="118" height="72" rx="8" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="2"/>
    <text x="114" y="160" text-anchor="middle" font-size="17" font-weight="700" fill="#12355b">Client UI</text>
    <text x="114" y="181" text-anchor="middle" font-size="13" fill="#526174">browser app</text>

    <rect x="221" y="130" width="118" height="72" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="280" y="160" text-anchor="middle" font-size="17" font-weight="700" fill="#12355b">API Gateway</text>
    <text x="280" y="181" text-anchor="middle" font-size="13" fill="#526174">auth routing</text>

    <rect x="387" y="130" width="118" height="72" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="446" y="160" text-anchor="middle" font-size="17" font-weight="700" fill="#12355b">Services</text>
    <text x="446" y="181" text-anchor="middle" font-size="13" fill="#526174">business logic</text>

    <ellipse cx="586" cy="143" rx="54" ry="17" fill="#c2415d"/>
    <rect x="532" y="143" width="108" height="52" fill="#c2415d"/>
    <ellipse cx="586" cy="195" rx="54" ry="17" fill="#9f2d48"/>
    <text x="586" y="172" text-anchor="middle" font-size="17" font-weight="700" fill="#ffffff">Database</text>

    <rect x="392" y="249" width="108" height="48" rx="8" fill="#edf2f7" stroke="#9fb0c5" stroke-width="2"/>
    <text x="446" y="278" text-anchor="middle" font-size="16" font-weight="700" fill="#12355b">Queue</text>
  </g>
  <path d="M176 166 H218 M342 166 H384 M508 166 H528" stroke="#c2415d" stroke-width="5" stroke-linecap="round"/>
  <path d="M204 154 L224 166 L204 178 M370 154 L390 166 L370 178 M514 154 L534 166 L514 178" fill="none" stroke="#c2415d" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M446 204 V245" stroke="#12355b" stroke-width="4" stroke-linecap="round"/>
  <path d="M434 232 L446 250 L458 232" fill="none" stroke="#12355b" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" fill="#12355b">
    <text x="197" y="121" text-anchor="middle">HTTPS JSON</text>
    <text x="363" y="121" text-anchor="middle">REST GraphQL</text>
    <text x="520" y="121" text-anchor="middle">SQL ORM</text>
    <text x="497" y="232" text-anchor="middle">events</text>
  </g>
</svg>
