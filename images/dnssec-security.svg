<svg xmlns="http://www.w3.org/2000/svg" width="700" height="350" viewBox="0 0 700 350" role="img" aria-labelledby="title desc">
  <title id="title">DNSSEC and DNS security</title>
  <desc id="desc">DNSSEC signs DNS responses so resolvers can verify integrity and authenticity.</desc>
  <rect width="700" height="350" fill="#f4f7fb"/>
  <rect x="28" y="28" width="644" height="294" rx="8" fill="#ffffff" stroke="#d7e0ec"/>
  <text x="350" y="62" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="27" font-weight="700" fill="#12355b">DNSSEC and DNS Security</text>
  <g transform="translate(78 120)" font-family="Segoe UI, Arial, sans-serif" font-weight="700" text-anchor="middle">
    <rect width="130" height="72" rx="8" fill="#edf2f7" stroke="#9fb0c5"/>
    <text x="65" y="32" fill="#12355b">DNS</text>
    <text x="65" y="55" fill="#526174">Record</text>
  </g>
  <g transform="translate(285 103)">
    <path d="M65 0 L125 26 V78 C125 117 98 143 65 160 C32 143 5 117 5 78 V26 Z" fill="#12355b"/>
    <rect x="42" y="72" width="46" height="39" rx="6" fill="#c2415d"/>
    <path d="M51 72 V58 C51 39 79 39 79 58 V72" fill="none" stroke="#c2415d" stroke-width="8" stroke-linecap="round"/>
    <circle cx="65" cy="92" r="6" fill="#ffffff"/>
    <text x="65" y="139" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">Signed</text>
  </g>
  <g transform="translate(492 120)" font-family="Segoe UI, Arial, sans-serif" font-weight="700" text-anchor="middle">
    <rect width="130" height="72" rx="8" fill="#e0f2fe" stroke="#7dd3fc"/>
    <text x="65" y="32" fill="#12355b">Verified</text>
    <text x="65" y="55" fill="#526174">Answer</text>
  </g>
  <path d="M210 156 H286 M414 156 H490" stroke="#c2415d" stroke-width="5" stroke-linecap="round"/>
  <path d="M267 144 L288 156 L267 168 M472 144 L492 156 L472 168" fill="none" stroke="#c2415d" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#12355b">
    <text x="350" y="269" text-anchor="middle">Protects against spoofed or tampered DNS responses</text>
    <text x="350" y="294" text-anchor="middle" fill="#526174">DoH and DoT can also encrypt DNS queries in transit.</text>
  </g>
</svg>
