<svg xmlns="http://www.w3.org/2000/svg" width="700" height="350" viewBox="0 0 700 350" role="img" aria-labelledby="title desc">
  <title id="title">HTTP cookies and sessions</title>
  <desc id="desc">A server issues a session cookie that the browser sends back on later requests.</desc>
  <rect width="700" height="350" fill="#f4f7fb"/>
  <rect x="28" y="28" width="644" height="294" rx="8" fill="#fff" stroke="#d7e0ec"/>
  <text x="350" y="63" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="27" font-weight="700" fill="#12355b">Cookies and Sessions</text>
  <rect x="82" y="128" width="140" height="96" rx="8" fill="#e0f2fe" stroke="#7dd3fc"/>
  <rect x="478" y="128" width="140" height="96" rx="8" fill="#12355b"/>
  <text x="152" y="181" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="#12355b">Browser</text>
  <text x="548" y="181" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="#fff">Server</text>
  <circle cx="350" cy="176" r="44" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/>
  <text x="350" y="181" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="17" font-weight="700" fill="#12355b">Cookie</text>
  <path d="M224 154 H304 M396 198 H476" stroke="#c2415d" stroke-width="5" stroke-linecap="round"/>
  <path d="M284 142 L306 154 L284 166 M416 186 L394 198 L416 210" fill="none" stroke="#c2415d" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="350" y="270" text-anchor="middle" font-family="Consolas,monospace" font-size="16" fill="#526174">Set-Cookie / Cookie headers keep state</text>
</svg>
