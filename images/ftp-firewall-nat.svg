<svg xmlns="http://www.w3.org/2000/svg" width="700" height="350" viewBox="0 0 700 350" role="img" aria-labelledby="title desc">
  <title id="title">FTP firewall and NAT issues</title>
  <desc id="desc">FTP needs control and dynamic data ports, which complicates firewall and NAT configuration.</desc>
  <rect width="700" height="350" fill="#f4f7fb"/>
  <rect x="28" y="28" width="644" height="294" rx="8" fill="#fff" stroke="#d7e0ec"/>
  <text x="350" y="63" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="27" font-weight="700" fill="#12355b">FTP Firewall and NAT Traversal</text>
  <rect x="74" y="135" width="118" height="80" rx="8" fill="#e0f2fe" stroke="#7dd3fc"/>
  <rect x="292" y="112" width="116" height="126" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
  <rect x="510" y="135" width="118" height="80" rx="8" fill="#12355b"/>
  <text x="133" y="181" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="17" font-weight="700" fill="#12355b">Client</text>
  <text x="350" y="168" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="17" font-weight="700" fill="#12355b">Firewall</text>
  <text x="350" y="194" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="14" fill="#526174">NAT / ALG</text>
  <text x="569" y="181" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="17" font-weight="700" fill="#fff">Server</text>
  <path d="M194 155 H290 M410 155 H508 M194 205 H290 M410 205 H508" stroke="#c2415d" stroke-width="4" stroke-linecap="round"/>
  <text x="350" y="276" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="15" font-weight="700" fill="#12355b">Port 21 control plus dynamic data ports</text>
</svg>
