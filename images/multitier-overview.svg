<svg xmlns="http://www.w3.org/2000/svg" width="700" height="350" viewBox="0 0 700 350" role="img" aria-labelledby="title desc">
  <title id="title">Multitier architecture overview</title>
  <desc id="desc">A request flows through presentation, application, and data tiers in a web application.</desc>
  <rect width="700" height="350" fill="#f4f7fb"/>
  <rect x="28" y="28" width="644" height="294" rx="8" fill="#ffffff" stroke="#d7e0ec"/>
  <text x="350" y="63" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="27" font-weight="700" fill="#12355b">Multitier Architecture Overview</text>
  <g font-family="Segoe UI, Arial, sans-serif">
    <rect x="57" y="128" width="156" height="105" rx="8" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="2"/>
    <text x="135" y="162" text-anchor="middle" font-size="19" font-weight="700" fill="#12355b">Presentation</text>
    <text x="135" y="190" text-anchor="middle" font-size="14" fill="#2f3b4d">Browser or app</text>
    <text x="135" y="212" text-anchor="middle" font-size="14" fill="#2f3b4d">renders the UI</text>

    <rect x="272" y="128" width="156" height="105" rx="8" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="350" y="162" text-anchor="middle" font-size="19" font-weight="700" fill="#12355b">Application</text>
    <text x="350" y="190" text-anchor="middle" font-size="14" fill="#2f3b4d">APIs process</text>
    <text x="350" y="212" text-anchor="middle" font-size="14" fill="#2f3b4d">business rules</text>

    <rect x="487" y="128" width="156" height="105" rx="8" fill="#fee2e2" stroke="#c2415d" stroke-width="2"/>
    <text x="565" y="162" text-anchor="middle" font-size="19" font-weight="700" fill="#12355b">Data</text>
    <text x="565" y="190" text-anchor="middle" font-size="14" fill="#2f3b4d">Databases store</text>
    <text x="565" y="212" text-anchor="middle" font-size="14" fill="#2f3b4d">persistent data</text>
  </g>
  <path d="M222 181 H263" stroke="#c2415d" stroke-width="5" stroke-linecap="round"/>
  <path d="M249 169 L269 181 L249 193" fill="none" stroke="#c2415d" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M437 181 H478" stroke="#c2415d" stroke-width="5" stroke-linecap="round"/>
  <path d="M464 169 L484 181 L464 193" fill="none" stroke="#c2415d" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="350" y="278" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#12355b">Each tier can be built, scaled, secured, and maintained independently.</text>
</svg>
