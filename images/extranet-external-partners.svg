    <circle cx="582" cy="236" r="35" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="582" y="241">Vendor</text>
  </g>
  <path d="M153 132 H250 M153 236 H250 M450 132 H547 M450 236 H547" stroke="#c2415d" stroke-width="4" stroke-linecap="round"/>
