<svg xmlns="http://www.w3.org/2000/svg" width="700" height="350" viewBox="0 0 700 350" role="img" aria-labelledby="title desc">
  <title id="title">FTP active versus passive mode</title>
  <desc id="desc">FTP active mode lets the server open the data connection, while passive mode lets the client open it.</desc>
  <rect width="700" height="350" fill="#f4f7fb"/>
  <rect x="28" y="28" width="644" height="294" rx="8" fill="#fff" stroke="#d7e0ec"/>
  <text x="350" y="63" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="27" font-weight="700" fill="#12355b">FTP Active vs Passive Mode</text>
  <line x1="350" y1="92" x2="350" y2="292" stroke="#d7e0ec" stroke-width="2"/>
  <g font-family="Segoe UI,Arial,sans-serif" text-anchor="middle" font-weight="700">
    <text x="180" y="120" font-size="20" fill="#12355b">Active</text>
    <rect x="80" y="150" width="90" height="52" rx="8" fill="#e0f2fe" stroke="#7dd3fc"/><text x="125" y="181" fill="#12355b">Client</text>
    <rect x="220" y="150" width="90" height="52" rx="8" fill="#12355b"/><text x="265" y="181" fill="#fff">Server</text>
    <text x="520" y="120" font-size="20" fill="#12355b">Passive</text>
    <rect x="420" y="150" width="90" height="52" rx="8" fill="#e0f2fe" stroke="#7dd3fc"/><text x="465" y="181" fill="#12355b">Client</text>
    <rect x="560" y="150" width="90" height="52" rx="8" fill="#12355b"/><text x="605" y="181" fill="#fff">Server</text>
  </g>
  <path d="M220 176 H170 M510 176 H560" stroke="#c2415d" stroke-width="5" stroke-linecap="round"/>
  <path d="M190 164 L168 176 L190 188 M540 164 L562 176 L540 188" fill="none" stroke="#c2415d" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="180" y="240" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="14" fill="#526174">Server connects back</text>
  <text x="520" y="240" text-anchor="middle" font-family="Segoe UI,Arial,sans-serif" font-size="14" fill="#526174">Client opens both channels</text>
</svg>
