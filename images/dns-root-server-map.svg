<svg xmlns="http://www.w3.org/2000/svg" width="700" height="350" viewBox="0 0 700 350" role="img" aria-labelledby="title desc">
  <title id="title">DNS root server map and anycast</title>
  <desc id="desc">Root servers are replicated around the world using anycast routing.</desc>
  <rect width="700" height="350" fill="#f4f7fb"/>
  <rect x="28" y="28" width="644" height="294" rx="8" fill="#ffffff" stroke="#d7e0ec"/>
  <text x="350" y="62" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="27" font-weight="700" fill="#12355b">Root Servers and Anycast</text>
  <path d="M115 185 C156 110 247 100 300 143 C356 97 466 116 511 186 C455 240 314 256 226 232 C178 221 143 206 115 185 Z" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="2"/>
  <path d="M174 160 C209 147 238 154 257 182 C230 199 188 195 174 160 Z" fill="#fef3c7" opacity=".9"/>
  <path d="M344 148 C391 127 443 145 473 183 C435 202 374 196 344 148 Z" fill="#fef3c7" opacity=".9"/>
  <g fill="#c2415d" stroke="#ffffff" stroke-width="3">
    <circle cx="177" cy="158" r="10"/>
    <circle cx="253" cy="188" r="10"/>
    <circle cx="345" cy="145" r="10"/>
    <circle cx="432" cy="174" r="10"/>
    <circle cx="512" cy="204" r="10"/>
    <circle cx="291" cy="234" r="10"/>
  </g>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="700" fill="#12355b">
    <rect x="72" y="258" width="560" height="38" rx="8" fill="#edf2f7" stroke="#d7e0ec"/>
    <text x="352" y="282" text-anchor="middle">13 logical root server names are served by many physical sites worldwide.</text>
  </g>
  <g transform="translate(277 94)">
    <rect width="146" height="54" rx="8" fill="#12355b"/>
    <text x="73" y="23" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700" fill="#ffffff">A-M Root</text>
    <text x="73" y="43" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#dbeafe">Anycast cloud</text>
  </g>
</svg>
