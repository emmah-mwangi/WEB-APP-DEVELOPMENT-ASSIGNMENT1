<svg xmlns="http://www.w3.org/2000/svg" width="700" height="350" viewBox="0 0 700 350" role="img" aria-labelledby="title desc">
  <title id="title">DNS resolution steps</title>
  <desc id="desc">A DNS lookup travels from browser to recursive resolver, root server, TLD server, and authoritative server.</desc>
  <rect width="700" height="350" fill="#f4f7fb"/>
  <rect x="28" y="28" width="644" height="294" rx="8" fill="#ffffff" stroke="#d7e0ec"/>
  <text x="350" y="62" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="27" font-weight="700" fill="#12355b">How DNS Resolution Works</text>
  <g font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" text-anchor="middle">
    <rect x="56" y="140" width="96" height="58" rx="8" fill="#e0f2fe" stroke="#7dd3fc"/>
    <text x="104" y="164" fill="#12355b">Browser</text>
    <text x="104" y="184" fill="#526174">asks</text>
    <rect x="184" y="140" width="112" height="58" rx="8" fill="#fef3c7" stroke="#f59e0b"/>
    <text x="240" y="164" fill="#12355b">Recursive</text>
    <text x="240" y="184" fill="#12355b">Resolver</text>
    <rect x="328" y="140" width="90" height="58" rx="8" fill="#edf2f7" stroke="#9fb0c5"/>
    <text x="373" y="164" fill="#12355b">Root</text>
    <text x="373" y="184" fill="#526174">Server</text>
    <rect x="450" y="140" width="90" height="58" rx="8" fill="#edf2f7" stroke="#9fb0c5"/>
    <text x="495" y="164" fill="#12355b">TLD</text>
    <text x="495" y="184" fill="#526174">Server</text>
    <rect x="572" y="140" width="88" height="58" rx="8" fill="#edf2f7" stroke="#9fb0c5"/>
    <text x="616" y="164" fill="#12355b">Author-</text>
    <text x="616" y="184" fill="#12355b">itative</text>
  </g>
  <g stroke="#c2415d" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M152 169 H181"/>
    <path d="M171 158 L184 169 L171 180"/>
    <path d="M296 169 H325"/>
    <path d="M315 158 L328 169 L315 180"/>
    <path d="M418 169 H447"/>
    <path d="M437 158 L450 169 L437 180"/>
    <path d="M540 169 H569"/>
    <path d="M559 158 L572 169 L559 180"/>
  </g>
  <path d="M617 207 C533 279 257 279 105 207" fill="none" stroke="#12355b" stroke-width="5" stroke-linecap="round"/>
  <path d="M127 204 L103 207 L116 228" fill="none" stroke="#12355b" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="350" y="267" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="17" font-weight="700" fill="#12355b">Answer returned: www.example.com = 93.184.216.34</text>
  <text x="350" y="108" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="15" fill="#526174">Each server points the resolver to the next level of the DNS tree.</text>
</svg>
