  <circle cx="248" cy="178" r="66" fill="#e0f2fe" stroke="#7dd3fc" stroke-width="3"/>
  <circle cx="452" cy="178" r="66" fill="#fef3c7" stroke="#f59e0b" stroke-width="3"/>
